
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microsoft 365 Plans — Enterprise Cloud Solutions Group LLC</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;600;700&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
html,body{margin:0;width:100%;overflow-x:hidden;font-family:'Barlow',sans-serif;}

/* ===== NAVBAR ===== */
.navbar{position:sticky;top:0;z-index:1000;background:#152C4A}
.navbar-inner{max-width:1200px;margin:0 auto;padding:0 16px;height:60px;display:flex;align-items:center;justify-content:space-between}
.nav-left{display:flex;align-items:center;gap:12px}
.logo img{height:34px}

.nav-links{display:flex;gap:12px}
.nav-links a{color:#fff;text-decoration:none;font-size:14px;white-space:nowrap}

.nav-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.lang-toggle{display:flex;background:rgba(255,255,255,.15);border-radius:20px;padding:2px}
.lang-btn{border:0;background:transparent;color:#fff;padding:4px 10px;font-weight:700;cursor:pointer;border-radius:16px}
.lang-btn.active{background:#2E75B6}

.cta{background:#2E75B6;color:#fff;text-decoration:none;padding:7px 14px;border-radius:6px;font-size:13px;font-weight:600;white-space:nowrap}

.hamburger{display:none;flex-direction:column;gap:4px;border:0;background:none;cursor:pointer}
.hamburger span{width:22px;height:2px;background:#fff}

.mobile-menu{display:none;background:#152C4A;padding:12px 16px}
.mobile-menu a{display:block;color:#fff;text-decoration:none;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.1)}
.mobile-menu.open{display:block}

@media(max-width:768px){.nav-links{display:none}.hamburger{display:flex}}

.lang-section{display:none;padding:24px}
.lang-section.active{display:block}
</style>
</head>
<body>

<header class="navbar">
  <div class="navbar-inner">
    <div class="nav-left">
      <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
      <a class="logo" href="index.html"><img src="assets/img/logo1_white.png" alt="ECSG"></a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="managed-services.html">Managed Services</a>
        <a href="cloud-services.html">Cloud Services</a>
        <a href="cybersecurity.html">Cybersecurity</a>
        <a href="ECSG_About.html">About Us</a>
      </nav>
    </div>
    <div class="nav-right">
      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="es">ES</button>
      </div>
      <a class="cta" href="ecsgcontact_sales.html">Contactar Ventas</a>
    </div>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="managed-services.html">Managed Services</a>
    <a href="cloud-services.html">Cloud Services</a>
    <a href="cybersecurity.html">Cybersecurity</a>
    <a href="ECSG_About.html">About Us</a>
  </div>
</header>

<div id="lang-en" class="lang-section active">
  <h1>Microsoft 365 Plans</h1>
  <p>English content goes here.</p>
</div>

<div id="lang-es" class="lang-section">
  <h1>Planes Microsoft 365</h1>
  <p>Contenido en español aquí.</p>
</div>

<script>
document.getElementById('hamburgerBtn').onclick=()=>document.getElementById('mobileMenu').classList.toggle('open');

document.querySelectorAll('.lang-btn').forEach(b=>{
  b.onclick=()=>{
    const l=b.dataset.lang;
    document.querySelectorAll('.lang-section').forEach(s=>s.classList.remove('active'));
    document.getElementById('lang-'+l).classList.add('active');
    document.querySelectorAll('.lang-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    localStorage.setItem('ecsg_lang',l);
  };
});
const saved=localStorage.getItem('ecsg_lang');
if(saved)document.querySelector(`.lang-btn[data-lang="${saved}"]`)?.click();
</script>

</body>
</html>
